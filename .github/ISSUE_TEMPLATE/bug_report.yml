name: Bug report
description: Report a reproducible problem
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the issue and expected behavior.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste Home Assistant logs or tracebacks.
      render: shell
  - type: input
    id: version
    attributes:
      label: Integration version
      placeholder: "0.1.0"
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.x.x"
